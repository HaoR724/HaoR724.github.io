    Projects:
      - name: 大模型基准测试中的数据泄漏检测
        summary: 面向预训练数据不可观测场景，研究 benchmark 评测可靠性问题。
        highlights:
          - 通过多项选择题选项重构，为 MMLU 与 CMMLU 构造衍生 benchmark 序列。
          - 调用 LLaMA 2、Qwen 等模型提取不同顺序下的 log-probability 分布。
          - 使用 Isolation Forest 识别刻意扰乱选项后的潜在污染样本。
      - name: 自动驾驶掉头决策与路径优化
        summary: 面向复杂城市掉头场景，构建感知、预测、决策、规划、控制一体化流程。
        highlights:
          - 使用 Kalman Filter 预测动态障碍物轨迹，并结合 Time-to-Collision 量化安全窗口。
          - 基于三次 Bezier 曲线与层次分析法生成兼顾安全与舒适性的平滑轨迹。
          - 使用 Model Predictive Control 完成低风险轨迹修正与高风险紧急制动。
      - name: 面向无人机图像的微小目标检测 SR-TOD
        summary: 面向复杂海面背景与光照变化，构建高精度微小目标视觉检测框架。
        highlights:
          - 融合 SuperGlue 图像拼接、加权融合与 Multi-Scale Retinex 预处理流程。
          - 提出 Self-Reconstruction Tiny Object Detection 框架，并设计轻量级重建头。
          - 设计 Difference-Guided Feature Enhancement 模块，增强多尺度特征表达能力。
